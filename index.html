<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grid Art Library</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #fff;
}
header {
  padding: 16px;
  text-align: center;
  font-size: 20px;
  background: #1a1a1a;
  position: sticky;
  top: 0;
}
#search {
  width: 80%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  padding: 12px;
}
.card {
  background: #1e1e1e;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s ease;
}
.card:hover {
  transform: scale(1.05);
}
.card img {
  width: 100%;
  height: 240px;
  object-fit: cover;
  display: block;
}
.card p {
  margin: 0;
  padding: 8px;
  text-align: center;
  font-size: 14px;
}
#viewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
#viewer img {
  max-width: 80%;
  max-height: 80%;
  border-radius: 10px;
}
button {
  margin-top: 12px;
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  background: #4caf50;
  color: white;
  cursor: pointer;
}
button:hover {
  background: #45a049;
}
</style>
</head>
<body>

<header>
  Grid Art Library
  <br>
  <input id="search" placeholder="Search art..." oninput="filterGrid()" />
</header>

<div class="grid" id="grid"></div>

<div id="viewer">
  <img id="viewerImg" />
  <button onclick="downloadImage()">Download</button>
  <button onclick="closeViewer()">Close</button>
</div>

<script>
const artworks = [
  {name:"Warrior", url:"https://picsum.photos/id/1011/600/900"},
  {name:"Dragon", url:"https://picsum.photos/id/1015/600/900"},
  {name:"Castle", url:"https://picsum.photos/id/1025/600/900"},
  {name:"Forest", url:"https://picsum.photos/id/1039/600/900"},
  {name:"Knight", url:"https://picsum.photos/id/1043/600/900"},
];

let currentImg = "";

function renderGrid(list){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  list.forEach(a => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<img src="${a.url}" /><p>${a.name}</p>`;
    div.onclick = () => openViewer(a.url);
    grid.appendChild(div);
  });
}

function filterGrid(){
  const q = document.getElementById("search").value.toLowerCase();
  renderGrid(artworks.filter(a => a.name.toLowerCase().includes(q)));
}

function openViewer(url){
  currentImg = url;
  document.getElementById("viewerImg").src = url;
  document.getElementById("viewer").style.display = "flex";
}

function closeViewer(){
  document.getElementById("viewer").style.display = "none";
}

function downloadImage(){
  const a = document.createElement("a");
  a.href = currentImg;
  a.download = "art.jpg";
  a.click();
}

renderGrid(artworks);
</script>

</body>
</html>
